name: K-9 Stack CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "sprint-**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx black pylint

      - name: Syntax check — all .py files
        run: |
          for f in $(find . -name "*.py" | grep -v __pycache__); do
            python3 -c "import ast; ast.parse(open('$f').read())" && echo "✓ $f" || (echo "✗ $f" && exit 1)
          done

      - name: Lint (black check) — full stack
        run: |
          black --check --line-length 100 \
            main.py \
            k9_paymaster.py \
            k9_mcp_manager.py \
            k9_orchestrator.py \
            k9_task_queue.py \
            src/orbitron_client.py \
            src/fed_whisperer_bridge.py \
            src/n8n_webhook_bridge.py \
            packai-node/agent.py \
            || true

      - name: Lint (pylint) — full stack
        run: |
          pylint \
            main.py \
            k9_paymaster.py \
            k9_mcp_manager.py \
            k9_orchestrator.py \
            k9_task_queue.py \
            --max-line-length=100 \
            --disable=C0114,C0115,C0116,W0611,R0903,R0914 \
            || true

      - name: Run tests
        run: pytest tests/ -v --asyncio-mode=auto || true
        env:
          ROUTER_MODE: cloud
          K9_PAYMASTER_ENABLE: "false"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
